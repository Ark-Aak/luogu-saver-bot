name: Bug report
description: Report a reproducible problem.
title: '[Bug]: '
labels:
    - 'status: triage'
    - 'type: bug'
body:
    - type: markdown
      attributes:
          value: |
              Thanks for reporting a bug. Please complete the checks below before submitting.
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: What went wrong?
          placeholder: Describe the bug clearly and concisely.
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Provide the smallest set of steps that reproduces the issue.
          placeholder: |
              1. Run ...
              2. Send ...
              3. Observe ...
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          description: What did you expect to happen?
      validations:
          required: true
    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
          description: What happened instead? Include logs or screenshots if useful.
      validations:
          required: true
    - type: input
      id: version
      attributes:
          label: Commit or version
          description: Which commit, branch, or version are you using?
          placeholder: main, commit hash, or release version
    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: OS, Node.js version, runtime mode, and relevant service versions.
          placeholder: Windows 11, Node.js 22, npm run dev, NapCat version ...
    - type: checkboxes
      id: self-check
      attributes:
          label: Self-check
          description: Please confirm you completed these checks.
          options:
              - label: I searched existing issues and did not find a duplicate.
                required: true
              - label: I reproduced this on the latest available commit or can explain why not.
                required: true
              - label: I included clear reproduction steps and expected/actual behavior.
                required: true
              - label: I removed secrets, tokens, and private data from logs and screenshots.
                required: true
